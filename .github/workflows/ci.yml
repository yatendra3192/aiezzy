name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    name: TypeScript Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + Next.js)
        run: npx next build
        env:
          # Stub env vars so build doesn't fail on missing secrets
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-key
          SUPABASE_JWT_SECRET: stub-jwt-secret-at-least-32-chars-long
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: stub-maps-key
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: stub-nextauth-secret-at-least-32-chars

  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-key
          SUPABASE_JWT_SECRET: stub-jwt-secret-at-least-32-chars-long
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: stub-maps-key
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: stub-nextauth-secret-at-least-32-chars

      - name: Start server & run smoke tests
        run: |
          npx next start &
          sleep 5
          npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-key
          SUPABASE_JWT_SECRET: stub-jwt-secret-at-least-32-chars-long
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: stub-maps-key
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: stub-nextauth-secret-at-least-32-chars

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
